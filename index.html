<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>outcrop360 | The Geology App</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --brand-color: #9E4632;
            --bg-color: #050505;
            --surface-color: #111111;
            --text-main: #ffffff;
            --text-secondary: #aaaaaa;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --rock-filter: brightness(0.4) contrast(1.1);
        }

        @media (prefers-color-scheme: light) {
            :root {
                --bg-color: #f8f9fa;
                --surface-color: #ffffff;
                --text-main: #1a1a1a;
                --text-secondary: #555555;
                --glass-bg: rgba(0, 0, 0, 0.03);
                --glass-border: rgba(0, 0, 0, 0.08);
                --rock-filter: invert(0.9) brightness(1.2) contrast(0.8);
            }
        }

        body { 
            background-color: var(--bg-color); 
            color: var(--text-main);
            margin: 0; padding: 0;
            font-family: 'Lexend', sans-serif;
            overflow-x: hidden;
        }

        /* --- FONDO DE ROCA --- */
        .bg-rock {
            position: fixed; 
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background-image: url('bg_resources_rock.webp');
            background-size: cover;
            background-position: center;
            background-attachment: scroll; 
            filter: var(--rock-filter);
            z-index: -1;
            animation: fadeInRock 2s ease-in-out forwards;
            opacity: 0;
        }
        @keyframes fadeInRock { to { opacity: 1; } }
        
        /* --- NAVEGACIÓN --- */
        nav {
            position: fixed;
            top: 0; left: 0; width: 100%;
            height: 70px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 5%;
            box-sizing: border-box;
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--glass-border);
            z-index: 1000;
        }

        .nav-brand {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
        }

        .nav-logo-img {
            height: 50px; /* Ajusta este valor si tu logo se ve muy grande o pequeño */
            width: auto;
        }

        .brand-text {
            font-family: 'Lexend', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .brand-outcrop { color: var(--brand-color); }
        .brand-360 { color: var(--text-main); }
        
        .nav-links {
            display: flex;
            gap: 30px;
        }

        .nav-links a {
            color: var(--text-main);
            text-decoration: none;
            font-weight: 500;
            font-size: 0.9rem;
            transition: color 0.3s;
        }

        .nav-links a:hover { color: var(--brand-color); }

        .nav-actions {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        /* Selector de Idioma Miniatura */
        .lang-switch {
            display: flex; gap: 10px; font-size: 0.8rem; font-weight: 600; cursor: pointer;
        }
        .lang-switch span { opacity: 0.5; transition: opacity 0.3s; }
        .lang-switch span.active { opacity: 1; color: var(--brand-color); }

        /* --- HERO SECTION --- */
        .hero {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 80px 5% 0; /* Espacio para el nav */
            box-sizing: border-box;
            max-width: 1200px;
            margin: 0 auto;
        }

        .hero-content {
            flex: 1;
            padding-right: 50px;
        }

        .hero h1 {
            font-family: 'Lexend', sans-serif;
            font-size: clamp(2.5rem, 5vw, 4rem);
            line-height: 1.1;
            margin-bottom: 20px;
            color: var(--text-main);
        }

        .hero h1 span { color: var(--brand-color); }

        .hero p {
            font-size: clamp(1rem, 2vw, 1.2rem);
            color: var(--text-secondary);
            margin-bottom: 40px;
            max-width: 500px;
            line-height: 1.6;
        }

        .cta-button {
            background-color: var(--brand-color);
            color: white;
            padding: 15px 30px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            font-size: 1rem;
            transition: transform 0.2s, box-shadow 0.2s;
            display: inline-block;
            border: none;
            cursor: pointer;
        }

        .cta-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(158, 70, 50, 0.3);
        }

        .hero-visual {
            flex: 1;
            display: flex;
            justify-content: center;
            position: relative;
        }

        /* Mockup Placeholder - Aquí irá la imagen de tu app */
        .phone-mockup {
            width: 300px;
            height: 600px;
            background: var(--surface-color);
            border: 12px solid #222;
            border-radius: 40px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-secondary);
            font-size: 0.9rem;
            text-align: center;
            padding: 20px;
        }

        @media (max-width: 768px) {
            .hero { flex-direction: column; text-align: center; padding-top: 120px; }
            .hero-content { padding-right: 0; margin-bottom: 50px; }
            .nav-links { display: none; } /* En móvil necesitaremos un menú hamburguesa luego */
            .hero p { margin: 0 auto 40px; }
        }
    </style>
</head>
<body>

    <div class="bg-rock"></div>

    <nav>
        <a href="#" class="nav-brand">
            <img src="outcrop.png" alt="Outcrop360 Logo" class="nav-logo-img">
            <span class="brand-text">
                <span class="brand-outcrop">Outcrop</span><span class="brand-360">360</span>
            </span>
        </a>
        
        <div class="nav-links">
            <a href="#features" id="nav-features">Features</a>
            <a href="#plans" id="nav-plans">Compare Plans</a>
        </div>

        <div class="nav-actions">
            <div class="lang-switch">
                <span id="btn-en" onclick="setLanguage('en')">EN</span>
                <span id="btn-es" onclick="setLanguage('es')">ES</span>
            </div>
            <a href="#" class="cta-button" id="nav-cta">Join Waitlist</a>
        </div>
    </nav>

    <header class="hero">
        <div class="hero-content">
            <h1 id="hero-title">Geology at your <span>fingertips.</span></h1>
            <p id="hero-subtitle">The ultimate tool for earth professionals. Access hundreds of resources, offline maps, and field tools in one place.</p>
            <button class="cta-button" id="hero-cta">Get early access</button>
        </div>
        <div class="hero-visual">
            <div class="phone-mockup">
                [Aquí insertaremos la captura<br>de la app Outcrop360]
            </div>
        </div>
    </header>

    <script>
        const translations = {
            en: {
                navFeatures: "Features",
                navPlans: "Compare Plans",
                navCta: "Join Waitlist",
                heroTitle: "Geology at your <span>fingertips.</span>",
                heroSubtitle: "The ultimate tool for earth professionals. Access hundreds of resources, offline maps, and field tools in one place.",
                heroCta: "Get early access"
            },
            es: {
                navFeatures: "Características",
                navPlans: "Planes",
                navCta: "Lista de espera",
                heroTitle: "La geología en tu <span>bolsillo.</span>",
                heroSubtitle: "La herramienta definitiva para profesionales de la Tierra. Accede a cientos de recursos y herramientas de campo en un solo lugar.",
                heroCta: "Acceso anticipado"
            }
        };

        function setLanguage(lang) {
            document.documentElement.lang = lang;
            localStorage.setItem('preferredLang', lang);

            // Actualizar UI del selector
            document.getElementById('btn-en').classList.toggle('active', lang === 'en');
            document.getElementById('btn-es').classList.toggle('active', lang === 'es');

            // Actualizar Textos
            document.getElementById('nav-features').textContent = translations[lang].navFeatures;
            document.getElementById('nav-plans').textContent = translations[lang].navPlans;
            document.getElementById('nav-cta').textContent = translations[lang].navCta;
            document.getElementById('hero-title').innerHTML = translations[lang].heroTitle;
            document.getElementById('hero-subtitle').textContent = translations[lang].heroSubtitle;
            document.getElementById('hero-cta').textContent = translations[lang].heroCta;
        }

        window.onload = function() {
            const savedLang = localStorage.getItem('preferredLang');
            const browserLang = (navigator.language || navigator.userLanguage).startsWith('es') ? 'es' : 'en';
            setLanguage(savedLang || browserLang);
        };
    </script>
</body>
</html>
