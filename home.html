<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Outcrop360 | Master the field</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <div class="bg-rock"></div>

    <nav>
        <a href="#" class="nav-brand">
            <img src="outcrop.png" alt="Outcrop360 Logo" class="nav-logo-img">
            <span class="brand-text">
                <span class="brand-outcrop">Outcrop</span><span class="brand-360">360</span>
            </span>
        </a>
        
        <div class="nav-links">
            <a href="#features" id="nav-features">Features</a>
            <a href="plans.html" id="nav-plans">Compare Plans</a>
        </div>

        <div class="nav-actions">
            <div class="lang-switch">
                <span id="btn-en" onclick="setLanguage('en')">EN</span>
                <span id="btn-es" onclick="setLanguage('es')">ES</span>
            </div>
            <a href="#" class="cta-button" id="nav-cta">Join Waitlist</a>
        </div>
    </nav>

<header class="hero">
        <div class="hero-content">
            <div id="animated-logo-container"></div>
            
            <h1 id="hero-title">Master the <span>field.</span></h1>
            <p id="hero-subtitle">SIG, mapas 3D, registro de datos y herramientas offline. Tu centro de comando definitivo para el trabajo de campo.</p>
            <button class="cta-button" id="hero-cta">Get early access</button>
        </div>
        <div class="hero-visual">
            <div class="phone-mockup">
                <picture>
                    <source srcset="app_screenshot_light.png" media="(prefers-color-scheme: light)">
                    <img src="app_screenshot_dark.png" alt="Outcrop360 Main Activity" class="app-screenshot">
                </picture>
            </div>
        </div>
    </header>
    
    <script src="js/translations.js"></script>
    <script src="js/components.js"></script> 
    <script src="js/main.js"></script>
</body>
</html>
